services:
  # ── Backend API ──────────────────────────────────────
  - type: web
    name: skillbridge-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      # ── Generate a real secret before deploying ──
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRATION_MINUTES
        value: "60"

      # ── LLM API keys (set manually) ──
      # At least one of OPENAI_API_KEY / GROQ_API_KEY is required for the
      # AI assessment to work. The application will start in every
      # combination of these two keys. See backend/llm_router.py for
      # provider selection logic.
      #
      # Cheapest / simplest deployment: leave OPENAI_API_KEY empty and
      # set GROQ_API_KEY only. The service will run in "Groq-only" mode
      # (Llama 3.1 8B Instant).
      #
      # If both are set, OpenAI (GPT-4o) is the primary provider and
      # Groq is the automatic runtime fallback.
      - key: OPENAI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false

      # ── Database ──
      - key: DATABASE_URL
        value: sqlite:///./skillbridge.db

      # ── CORS — update after frontend is deployed ──
      - key: CORS_ORIGINS
        sync: false

      # ── Frontend URL — update after frontend is deployed ──
      - key: FRONTEND_URL
        sync: false

      # ── Google OAuth (optional) ──
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false

    # Free tier: database resets on redeploy.
    # Paid plans: add a persistent disk for SQLite persistence.
    # disk:
    #   name: skillbridge-data
    #   mountPath: /data
    #   sizeGB: 1

  # ── Frontend (Static Site) ───────────────────────────
  - type: static_site
    name: skillbridge-frontend
    rootDir: frontend
    buildCommand: npm install --legacy-peer-deps && npm run build
    staticPublishPath: dist
    envVars:
      # Set this to the backend URL from the service above
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        from: /*
        to: /index.html